<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ai-oko Fabrics CMS</title>
  <!-- 1. Load Netlify Identity Widget FIRST -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- 2. Then load Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // 3. Initialize Decap CMS after both scripts are ready
    DecapCMS.init({
      config: {
        backend: {
          name: "git-gateway",
          branch: "main"
        },
        media_folder: "src/images/products",
        public_folder: "/images/products",
        collections: [
          {
            name: "products",
            label: "Products",
            folder: "src/_data/products",
            create: true,
            slug: "{{name}}",
            fields: [
              { label: "Name", name: "name", widget: "string" },
              { label: "Price (₦)", name: "price", widget: "number", valueType: "int" },
              { label: "Image", name: "image", widget: "image" },
              {
                label: "Category",
                name: "category",
                widget: "select",
                options: ["ankara", "premium-fabrics", "laces", "brocades", "adires", "asooke", "bags", "shoes"]
              },
              { label: "Subcategory", name: "subcategory", widget: "string", required: false },
              { label: "Colors", name: "colors", widget: "list", default: [] },
              { label: "Description", name: "description", widget: "text" },
              { label: "Size", name: "size", widget: "string", default: "6 yards" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
